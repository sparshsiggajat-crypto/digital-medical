# ========================================================
# CUREWELL SYSTEM: PRODUCTION NGINX HOSTING CONFIGURATION
# ========================================================
# Path: /etc/nginx/sites-available/curewell

server {
    listen 80;
    server_name curewell-pharmacy.example.com; # Replace with your Domain or IP

    # UTF-8 Quality encoding
    charset utf-8;

    # Maximum file upload size limit (useful for medical backups)
    client_max_body_size 25M;

    # 1. SERVE FRONTEND STATIC FILES DIRECTLY
    # Compiled Vite files should reside at this designated directory
    root /var/www/curewell/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static Assets Aggressive Browser Caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # 2. REVERSE PROXY ALL /api/ ROUTING TO FLASK/GUNICORN
    # Gunicorn daemon usually listens on Localhost Port 8000 (or Unix socket)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        
        # Standard proxy parameters for security audits
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable proxy buffering to support real-time data feeds
        proxy_buffering off;
        proxy_read_timeout 90;
    }

    # Custom Error Pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
